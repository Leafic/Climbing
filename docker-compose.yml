services:
  # ─────────────────────────────────────────
  # PostgreSQL DB
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: climbing_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # FastAPI 백엔드
  # ─────────────────────────────────────────
  backend:
    build: ./backend
    container_name: climbing_backend
    env_file:
      - path: ./.env         # 프로젝트 루트 .env (GOOGLE_API_KEY 등 시크릿 보관)
        required: false       # 파일 없어도 오류 없음
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app        # 코드 변경 시 재빌드 없이 반영
      - uploads_data:/app/uploads     # 업로드 파일 영속 저장
    depends_on:
      db:
        condition: service_healthy    # DB 준비 후 백엔드 시작

  # ─────────────────────────────────────────
  # Next.js 프론트엔드
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    container_name: climbing_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─────────────────────────────────────────
  # [선택] Redis — 비동기 작업 큐 필요 시 추가
  # 사용 시: depends_on에 redis 추가, 백엔드에 REDIS_URL 환경 변수 추가
  # ─────────────────────────────────────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: climbing_redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data

  # ─────────────────────────────────────────
  # [선택] Celery Worker — AI 분석을 비동기로 처리할 때 추가
  # redis 서비스 활성화 후 함께 사용
  # ─────────────────────────────────────────
  # worker:
  #   build: ./backend
  #   container_name: climbing_worker
  #   command: celery -A app.celery_app worker --loglevel=info
  #   environment:
  #     DATABASE_URL: postgresql://climbing_user:climbing_pass@db:5432/climbing_db
  #     REDIS_URL: redis://redis:6379/0
  #   volumes:
  #     - ./backend/app:/app/app
  #     - uploads_data:/app/uploads
  #   depends_on:
  #     - db
  #     - redis

volumes:
  postgres_data:
  uploads_data:
  # redis_data:   # redis 활성화 시 주석 해제
